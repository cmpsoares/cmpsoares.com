<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TEKSOMA Technology & Consultancy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CMPSOARES is now TEKSOMA Technology & Consultancy.">
  <link rel="shortcut icon" href="{{ site.Params.favicon | relURL }}" type="image/x-icon">
  <link rel="canonical" href="https://tech.teksoma.com/">
  <meta http-equiv="refresh" content="3;url=https://tech.teksoma.com/">
  <meta name="theme-color" content="#070d14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep: hsl(215, 48%, 5%);
      --dark: hsl(215, 48%, 10%);
      --navy: hsl(215, 50%, 22%);
      --gold: hsl(40, 55%, 52%);
      --muted: rgba(232, 237, 244, 0.45);
    }

    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #e8edf4;
      background: radial-gradient(ellipse 100% 70% at 50% 0%, var(--navy) 0%, var(--dark) 50%, var(--deep) 100%);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
    }

    .bg svg {
      position: absolute;
      width: min(420px, 90vw);
      height: auto;
      stroke: rgba(184, 150, 62, 0.1);
      fill: none;
    }

    .bg svg:nth-child(1) { top: 10%; left: -8%; animation: drift 55s ease-in-out infinite; }
    .bg svg:nth-child(2) { bottom: 8%; right: -6%; animation: drift 65s ease-in-out infinite reverse; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(40px, 30px); }
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem 1.5rem;
      text-align: center;
      animation: fade-in 0.6s ease both;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .transition {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 3.5vw, 2rem);
      flex-wrap: nowrap;
    }

    .brand-from img {
      display: block;
      height: clamp(40px, 8vw, 56px);
      width: auto;
      max-width: min(180px, 34vw);
      object-fit: contain;
      opacity: 0.92;
      filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.25));
    }

    .arrow {
      flex-shrink: 0;
      color: var(--gold);
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      line-height: 1;
      opacity: 0.9;
      animation: nudge 2s ease-in-out infinite;
    }

    @keyframes nudge {
      0%, 100% { transform: translateX(0); opacity: 0.75; }
      50%      { transform: translateX(4px); opacity: 1; }
    }

    .brand-to {
      flex-shrink: 0;
    }

    .wordmark {
      display: block;
      width: clamp(160px, 36vw, 240px);
      height: auto;
    }

    .message {
      font-size: clamp(0.85rem, 1.8vw, 0.95rem);
      color: var(--muted);
      max-width: 26rem;
      line-height: 1.5;
    }

    .redirect {
      font-size: 0.8rem;
      color: rgba(232, 237, 244, 0.3);
    }

    .redirect a {
      color: var(--gold);
      text-decoration: none;
    }

    .redirect a:hover { text-decoration: underline; }

    .bar {
      width: min(160px, 40vw);
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 1px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0;
      background: var(--gold);
      border-radius: 1px;
      animation: progress 3s linear forwards;
    }

    @keyframes progress {
      to { width: 100%; }
    }

    @media (max-width: 520px) {
      .transition {
        flex-direction: column;
        gap: 1.25rem;
      }

      .arrow {
        transform: rotate(90deg);
        animation-name: nudge-down;
      }

      @keyframes nudge-down {
        0%, 100% { transform: rotate(90deg) translateX(0); opacity: 0.75; }
        50%      { transform: rotate(90deg) translateX(4px); opacity: 1; }
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg svg, .page, .bar-fill, .arrow { animation: none !important; }
      .bar-fill { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <svg viewBox="0 0 400 120"><polyline points="0,90 60,60 120,75 200,25 280,45 400,15" stroke-width="1.5"/></svg>
    <svg viewBox="0 0 400 120"><polyline points="0,70 80,50 160,65 240,30 320,55 400,20" stroke-width="1"/></svg>
  </div>

  <main class="page">
    <div class="transition">
      <div class="brand-from">
        <img src="{{ "images/logo.png" | relURL }}" alt="CMPSOARES" width="180" height="56">
      </div>

      <span class="arrow" aria-hidden="true">→</span>

      <div class="brand-to">
        <svg class="wordmark" viewBox="0 0 200 40" role="img" aria-label="TEKSOMA">
          <text x="0" y="32" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="36" letter-spacing="-0.025em">
            <tspan fill="#FFFFFF">TΣK</tspan><tspan fill="#B8963E">SOMΛ</tspan>
          </text>
        </svg>
      </div>
    </div>

    <p class="message">cmpsoares.com is now TEKSOMA Technology &amp; Consultancy</p>

    <div class="bar" aria-hidden="true"><div class="bar-fill"></div></div>

    <p class="redirect">Redirecting to <a href="https://tech.teksoma.com/">tech.teksoma.com</a>…</p>
  </main>

  <script>
    (function () {
      var target = 'https://tech.teksoma.com/';
      var delay = 3000;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) delay = 500;
      setTimeout(function () { window.location.replace(target); }, delay);
    })();
  </script>
</body>
</html>
