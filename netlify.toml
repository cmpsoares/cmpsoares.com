[build]
  publish = "public"
  command = "hugo --minify --gc"
  
[build.environment]
  HUGO_VERSION = "0.91.2"
  HUGO_BASEURL = "https://cmpsoares.com/"
  # Skip vendored theme demo content from secrets scanning; those are upstream
  # placeholder keys, not real credentials, and the exampleSite isn't built.
  SECRETS_SCAN_OMIT_PATHS = "themes/agico-hugo/exampleSite/**"
